<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</style>
</head>
<body>


<div class="sidebar">
    <div class="logo">JC</div>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Support</a>
    <a href="#">Settings</a>
</div>


<div class="main">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <a href="log-in.html" class="logout">Log Out</a>
    </div>

    <div class="cards">
        <div class="card">
            <h2>Total Products</h2>
            <p>12</p>
        </div>

        <div class="card">
            <h2>Orders</h2>
            <p>54</p>
        </div>

        <div class="card">
            <h2>Total Stock</h2>
            <p>21</p>
        </div>

        <div class="card">
            <h2>Tanan Mabayran nimo</h2>
            <p>$12,430</p>
        </div>
    </div>
        <div class="graph-svg-wrapper">
            <svg viewBox="0 0 500 200" style="width:100%; height:auto; display: block;">
                <line x1="40" y1="30" x2="40" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                <line x1="130" y1="30" x2="130" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                <line x1="220" y1="30" x2="220" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                <line x1="310" y1="30" x2="310" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                <line x1="400" y1="30" x2="400" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                        
                <line x1="40" y1="170" x2="460" y2="170" stroke="#b0c0d0" stroke-width="1.2" />
                <line x1="40" y1="135" x2="460" y2="135" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                <line x1="40" y1="100" x2="460" y2="100" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                <line x1="40" y1="65" x2="460" y2="65" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                <line x1="40" y1="30" x2="460" y2="30" stroke="#b0c0d0" stroke-width="1.2" />
                        

                <text x="40" y="190" class="axis-text">00:00</text>
                <text x="130" y="190" class="axis-text">06:00</text>
                <text x="220" y="190" class="axis-text">12:00</text>
                <text x="310" y="190" class="axis-text">18:00</text>
                <text x="400" y="190" class="axis-text">24:00</text>

                <polyline points="40,150 130,100 220,60 310,120 400,80 460,140" stroke="#1e3d5e" stroke-width="3" fill="none" class="line-path" style="filter: drop-shadow(2px 2px 2px #a3b1c6);" />
                        
                <g class="dot-group">
                    <circle cx="40" cy="150" r="5" fill="#1e3d5e" style="--i:1;" />
                    <circle cx="130" cy="100" r="5" fill="#1e3d5e" style="--i:2;" />
                    <circle cx="220" cy="60" r="5" fill="#1e3d5e" style="--i:3;" />
                    <circle cx="310" cy="120" r="5" fill="#1e3d5e" style="--i:4;" />
                    <circle cx="400" cy="80" r="5" fill="#1e3d5e" style="--i:5;" />
                    <circle cx="460" cy="140" r="5" fill="#1e3d5e" style="--i:6;" />
                </g>
            </svg>
        </div>
    <div class="table-section">
        <h2>Manage Products</h2>

        <table>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>Samsung Galaxy S26 Ultra</td>
                <td>$1299</td>
                <td>15</td>
                <td><button>Edit</button> <button>Delete</button></td>
            </tr>

            <tr>
                <td>Samsung Galaxy S25 Ultra</td>
                <td>$1199</td>
                <td>20</td>
                <td><button>Edit</button> <button>Delete</button></td>
            </tr>

        </table>
    </div>


</body>
</html>
