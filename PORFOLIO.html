<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box" id="about">
        <nav>
            <div class="myLogo">JC</div>
            <ul>
                <li><a onclick="about()">About Me</a></li>
                <li><a onclick="My()">My Certificate</a></li>
                <li><a onclick="Contact()">Contact</a></li>
                <li><a onclick="Services()">Services</a></li>
            </ul>
        </nav>
        <div class="logo"></div>
        <div class="h1"><pre>James Carl</pre></div>
        <div class="p"><p>11th CSS day Former web design champion</p></div>
    </div>
    <div class="boxMAIN" id="My">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>
    <div class="services" id="services">
       
        <div class="ring">
            <i style="--clr:green;"></i>
            <i style="--clr: rgb(114, 244, 7);"></i>
            <i style="--clr:#052504;"></i>


            <form action="">
                <input type="text" placeholder="Message" required>
                <input type="email" placeholder="Email" required>
                <button type="submit">Submit</button>
            </form>

        </div>
    </div>
    <style>
        body{
            height: 100vh;
            width: 100%;
            padding: 0;
            margin: 0;
        }
        .myLogo{
            height: 40px;
            width: 40px;
            border: solid 2px white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            color: white;
            left: 5%;
        }
        @font-face {
            font-family: "a" ;
            src: url(Fonts/Nexa-Heavy.ttf);
        }*{
            font-family: "a";
        }
        .box{
            background: radial-gradient(circle, white, black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            border-image: fill 0 linear-gradient(#0001, #000);
            gap: 30px;
          
        }
        .box1{
            background-image: url(james.cert1.jpg);
            background-position: center;
            background-size: cover;
            height: 400px;
            box-shadow: 0px 0px 10px;
            width: 450px;
              margin: 20px;
            background-color: white;
            transform: translateY(200px);
            opacity: 0;
            transition: 1s ease-in-out;
            border-image: fill 0 linear-gradient(#0001, #000);
        }
        .box1:hover{
            cursor: pointer;
            transition: ease-in 0.2s;
        }
        .box2{
            background-image: url(james.cert2.jpg);
            background-position: center;
            background-size: cover;
            background-position: center;
            background-size: cover;
            height: 400px;
            box-shadow: 0px 0px 10px;
            width: 450px;
              margin: 20px;
            background-color: white;
            transform: translateY(200px);
            opacity: 0;
            transition: 1s ease-in-out;
            transition-delay: .2s;
            border-image: fill 0 linear-gradient(#0001, #000);
        }
        .box2:hover{
            cursor: pointer;
            transition: ease-in 0.2s;

        }
        .box3{
            height: 400px;
            box-shadow: 0px 0px 10px;
            width: 450px;
            margin: 20px;
            background-color: white;
            transform: translateY(200px);
            opacity: 0;
            transition: 1s ease-in-out;
            transition-delay: .4s;
            border-image: fill 0 linear-gradient(#0001, #000);
            
        }
.box1 {
    position: relative;
}

.box1::before {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: 0px 0px 10px white;
    transition: opacity 0.5s ease;
}

.box1:hover::before {
    opacity: 0;
}
.box1:hover{
    cursor: pointer;
    transition: all ease-in-out 1s;
    border-image: none;
}
.box2 {
    position: relative;
}

.box2::before {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: 0px 0px 10px white;
    transition: opacity 0.5s ease;
}

.box2:hover::before {
    opacity: 0;
}
.box2:hover{
    cursor: pointer;
    transition: all ease-in-out 1s;
    border-image: none;
}
.ring {
  position: relative;
  width: 500px;
  height: 500px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.ring i {
  position: absolute;
  inset: 0;
  border: 4px solid rgb(53, 5, 5);
  transition: 0.5s;
}

.ring i:nth-child(1) {
  border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
  animation: animate 6s linear infinite;
}

.ring i:nth-child(2) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate 4s linear infinite;
}

.ring i:nth-child(3) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate2 10s linear infinite;
}

.ring:hover i {
  border: 6px solid var(--clr);
  filter: drop-shadow(0 0 20px var(--clr));
}

@keyframes animate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes animate2 {
  0% { transform: rotate(360deg); }
  100% { transform: rotate(0deg); }
}

        .box1.show{transform: translateY(0px); opacity: 1;}
        .box2.show{transform: translateY(0px); opacity: 1;}
        .box3.show{transform: translateY(0px); opacity: 1;}

        .boxMAIN{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: row;
            min-height: 100vh;  
            width: 100%;
            background: radial-gradient(circle, white, black);
            border-image: fill 0 linear-gradient(#000, #0001);
        }
        nav{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            width: 100%;
            position: fixed;
            top: 0%;
            z-index: 9999;
            backdrop-filter: blur(20px);
        }
        ul{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 35px;
            position: relative;
            left: 20%;
            list-style: none;
        }
        li a{
            text-transform: uppercase;
            text-decoration: none;
            font-weight: bold;
            color: beige;
        } 
        .logo{
            height: 500px;
            width: 500px;
            border: none;
            background-image: url(633949a2e070661230f9528150c8ccc0-removebg-preview.png);
            background-size: cover;
            background-position: center;
            position: relative;
            left: 34%;
              z-index: 1;
              animation: fade ease-in-out 1s;
              animation-delay: 1.5s;
              animation-fill-mode: both;
            bottom: 20px;
        }
        @keyframes fade{
            from{
                opacity: 0;
            }
            to{
                opacity: 1;
            }
        }
        .h1{
            height: 600px;
            width: 600px;
            position: relative;
            right: 12%;
            bottom: 150px;
            font-weight: bold;
            font-size: 160px;
            color: rgb(194, 16, 16);
            color: transparent;
            -webkit-text-stroke: 2px white;
            animation: down 1.5s ease-in-out;
        }
        @keyframes down{
            from{
                transform: translateY(150px);
                opacity: 0;
            }
            to{
                transform: translateY(0px);
                opacity: 1;
            }
        }
        
        .p p{
            height: 40px;
            width: 0ch;
            position: relative;
            right: 130%;
            top: 250px;
            font-weight: bold;
            color: white;
            border-right: 1px solid white;
            font-size: 20px;
            animation: type 10s steps(40) infinite, blink .6s infinite;
            overflow: hidden;
            white-space: nowrap;
        }
        @keyframes type{
            0%{
                width: 0%;
            }
            30%{
                width: 100%;
            }
            70%{
                width: 100%;
            }
            100%{
                width: 0%;
            }
        }
        @keyframes blink{
            from{
                border-color: transparent;
            }
            to{
                border-color: white;
            }
        }
        .services{
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle, white, black);
            border-image: fill 0 linear-gradient(#0001, #000);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .services input{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 350px;
            height: 30px;
            border: none;
            border-bottom: solid 2px white;
            background: none;
            outline: none;
            margin-top: 20px;
        }
        .services button{
            height: 30px;
            width: 100px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;
            position: relative;
            left: 40%;
        }
        .services input::placeholder{
            color: white;
            padding: 20px;
        }
    </style>
    <script>
        function about(){
        document.getElementById("about").scrollIntoView({behavior: "smooth"});

    	setTimeout(() => {
			location.reload();
		}, 800);
        }

        function My(){
        document.getElementById("My").scrollIntoView({behavior: "smooth"});
        }
        
        function Contact(){
        document.getElementById("services").scrollIntoView({behavior: "smooth"});
        }

       const observer = new IntersectionObserver((entries) => {
	       entries.forEach(entry => {
		       if (entry.isIntersecting) {
		       	entry.target.classList.add("show");
		       }
	       });
       });

        const hiddenElements = document.querySelectorAll(".box1, .box2, .box3");

        hiddenElements.forEach(el => observer.observe(el));
    </script>
</body>
</html>
