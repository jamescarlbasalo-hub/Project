<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:arial, sans-serif;
}
*{
    font-family: 'a';
}
@font-face {
    font-family: 'a'; 
    src: url(Fonts/Nexa-Heavy.ttf);
}

body{
    background:#e0e5ec;
    display:flex;
    min-height:100vh;
}
@keyframes a {
    from{
        transform: translateX(-250px);
    }
    to{
        transform: translateX(0px);
    }
}

.sidebar{
    animation: a ease-in-out 1.5s;
    width:230px;
    background:#e0e5ec;
    box-shadow:-10px -10px 20px #ffffff, 10px 10px 20px #b8bcc2;
    padding:30px 20px;
    display:flex;
    flex-direction:column;
    gap:30px;
}
@keyframes float{
    from{
        transform: translateY(30px);
    }
    to{
        transform: translateY(0px);
    }
}

.logo{
    animation: float 2s infinite alternate-reverse;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border:2px solid black;
    border-radius:50%;
    width:100px;
    height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    background-image:  url(dark.queen.jpg);
    background-size: cover;
    background-position: center;
}

.sidebar a{
    text-decoration:none;
    color:black;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    box-shadow:-6px -6px 12px #ffffff, 6px 6px 12px #b8bcc2;
}

.sidebar a:hover{
    box-shadow:inset -4px -4px 6px #ffffff, inset 4px 4px 6px #b8bcc2;
}


.main{
    flex:1;
    padding:40px;
}
@keyframes b{
    from{
        opacity: 0;
        transform: translateY(200px);
    }
    to{
        opacity: 1;
        transform: translateY(0px);
    }
}
.topbar{
    animation: b ease-in-out 1.5s;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    border-radius:20px;
    box-shadow:-10px -10px 20px #ffffff, 10px 10px 20px #b8bcc2;
    margin-bottom:40px;
}

.topbar h1{
    font-size:22px;
}

.logout{
    padding:8px 18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    color:black;
    box-shadow:-6px -6px 12px #ffffff, 6px 6px 12px #b8bcc2;
}

.logout:hover{
    box-shadow:inset -4px -4px 6px #ffffff, inset 4px 4px 6px #b8bcc2;
}


.cards{
    animation: b ease-in-out 1.5s;
    animation-delay: 0.2s;
    animation-fill-mode: both;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:30px;
}

.card{
    position: relative;
    bottom: 20%;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:-10px -10px 20px #ffffff, 10px 10px 20px #b8bcc2;
    height: 60px;
    width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card h2{
    font-size:14px;
    text-align: center;
    position: relative;
    top: 0%;
}

.card p{
    margin-left: 10px;
    font-size:17px;
    position: relative;
    text-align: center;
    font-weight:bold;
}


.table-section{
    animation: b ease-in-out 1.5s;
    animation-delay: 0.6s;
    animation-fill-mode: both;
    position: relative;
    top: 5%;
    padding:30px;
    border-radius:20px;
    box-shadow:-10px -10px 20px #ffffff, 10px 10px 20px #b8bcc2;
}

table{
    width:100%;
    border-collapse:separate;
    margin-top:20px;
    border-spacing: 0px 15px;
}

th, td{
    padding:12px;
    text-align:left;
}

th{
    font-weight:bold;
}

tr{
    box-shadow:-3px -3px 6px #ffffff, 3px 3px 6px #b8bcc2;
    border-radius:10px;
}

button{
    padding:6px 12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#e0e5ec;
    box-shadow:-4px -4px 8px #ffffff, 4px 4px 8px #b8bcc2;
}

button:hover{
    box-shadow:inset -3px -3px 6px #ffffff, inset 3px 3px 6px #b8bcc2;  
    cursor:pointer;
}

        .graph-svg-wrapper {
            animation: b ease-in-out 1.5s;
            animation-delay: 0.4s;
            animation-fill-mode: both;
            max-width: 500px;
            position: relative;
            left: 25.5%;
            top: 2%;
            padding: 1rem 1rem 0.5rem 1rem;
            background: #d9dee6;
            border-radius: 2rem;
            box-shadow: inset 3px 3px 8px #a3b1c6, inset -3px -3px 8px #ffffff;
        }

    
        .line-path {
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            animation: drawLine 2.5s ease-out forwards;
            animation-delay: 1.4s;
            animation-fill-mode: both;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .dot-group circle {
            opacity: 0;
            animation: popDots 0.4s ease forwards;
            animation-delay: calc(1.5s + (var(--i) * 0.1s));
        }

        @keyframes popDots {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

@media(max-width:768px){
    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        flex-direction:row;
        justify-content:space-around;
        align-items:center;
    }

    .main{
        padding:20px;
    }

    .topbar{
        flex-direction:column;
        gap:10px;
        height:auto;
        padding:15px;
    }
}

@media(max-width:768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        flex-direction:row;
        justify-content:space-around;
        align-items:center;
        padding:15px;
    }

    .sidebar .logo{
        width:40px;
        height:40px;
        font-size:16px;
    }

    .sidebar a{
        padding:8px 10px;
        font-size:12px;
    }

    .main{
        padding:20px;
    }

    .topbar{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    .cards{
        grid-template-columns:1fr;
    }
     .graph-svg-wrapper{
        position: relative;
        left: 1%;
     }
}
</style>
</head>
<body>

<div class="sidebar">

        <div class="card">

    </div>
     <div class="graph-svg-wrapper">
                    <svg viewBox="0 0 500 200" style="width:100%; height:auto; display: block;">
                       
                        <line x1="40" y1="30" x2="40" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                        <line x1="130" y1="30" x2="130" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />

                        <line x1="310" y1="30" x2="310" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                        <line x1="400" y1="30" x2="400" y2="170" stroke="#9aabc0" stroke-width="1" stroke-dasharray="3 3" />
                   
                        <line x1="40" y1="170" x2="460" y2="170" stroke="#b0c0d0" stroke-width="1.2" />
                        <line x1="40" y1="135" x2="460" y2="135" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                        <line x1="40" y1="100" x2="460" y2="100" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                        <line x1="40" y1="65" x2="460" y2="65" stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="2 4" />
                        <line x1="40" y1="30" x2="460" y2="30" stroke="#b0c0d0" stroke-width="1.2" />
                      
                        <text x="40" y="190" class="axis-text">00:00</text>

                        <polyline points="40,150 130,100 220,60 310,120 400,80 460,140" stroke="#1e3d5e" stroke-width="3" fill="none" class="line-path" style="filter: drop-shadow(2px 2px 2px #a3b1c6);" />

                        <g class="dot-group">
                            <circle cx="40" cy="150" r="5" fill="#1e3d5e" style="--i:1;" />

                </div>

    <div class="table-section">

</body>
</html>
