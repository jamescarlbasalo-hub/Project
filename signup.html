<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Login</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap");

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Quicksand", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #e0e5ec;
  width: 100%;
  overflow: hidden;
}
@keyframes a {
    from{
        opacity: 0;
    }
    to{
        opacity: 1;
    }
}

.ring {
  position: relative;
  width: 600px;
  height: 600px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: a ease-in-out 1.5s;
}

.ring i {
  position: absolute;
  inset: 0;
  border: 4px solid gray;
  transition: 0.5s;
}

.ring i:nth-child(1) {
  border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
  animation: animate 6s linear infinite;
}

.ring i:nth-child(2) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate 4s linear infinite;
}

.ring i:nth-child(3) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate2 10s linear infinite;
}

.ring:hover i {
  border: 6px solid var(--clr);
  filter: drop-shadow(0 0 20px var(--clr));
}

@keyframes animate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes animate2 {
  0% { transform: rotate(360deg); }
  100% { transform: rotate(0deg); }
}

.login {
    animation: a ease-in-out 1.5s;
  position: absolute;
  width: 450px;
  height:470px;
  border-radius: 50px;
  box-shadow: 
            -10px -10px 20px #ffffff,
             10px 10px 20px #b8bcc2;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
  background:#e0e5ec;
}
.login span a{
    position: absolute;
    top: 19px;
    left: 20px;
    font-size: 2em;
    color: gray;
    cursor: pointer;
    text-decoration: none;
}

.login h2 {
  font-size: 2em;
  color: gray;
  font-weight: bold;
}

.login .inputBx {
  position: relative;
  width: 100%;
  margin-top: 20px;
}
 .inputBx {
  display: flex;
  align-items: center;
  justify-content: center;
 }
 @keyframes up{
  from{
    transform: translateY(200px);
    opacity: 0;
  }
  to{
    transform: translateY(0px);
    opacity: 1;
  }
 }
.login .inputBx1 input {
  animation: up ease-in-out 1.5s;
  margin-top: 15px;
  width: 270px;
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 1.2em;
  background: #e0e5ec;
  box-shadow:
      inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
  outline: none;
}
.login .inputBx2 input {
  animation: up ease-in-out 1.5s;
  animation-delay: 0.2s;
  animation-fill-mode: both;
  width: 270px;
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 1.2em;
  background: #e0e5ec;
  margin-top: 15px;
  box-shadow:
      inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
  outline: none;
}
.login .inputBx3 input {
  margin-top: 15px;
  animation: up ease-in-out 1.5s;
   animation-delay: 0.4s;
  animation-fill-mode: both;
  width: 270px;
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 1.2em;
  background: #e0e5ec;
  box-shadow:
      inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
  outline: none;
}
.login .inputBx4 input {
  width: 270px;
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 1.2em;
  background: #e0e5ec;
  box-shadow:
      inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
  outline: none;
}
.inputBx button{
  animation: a ease-in-out 1s;
  animation-delay: 1.8s;
  animation-fill-mode: both;
  height: 35px;
  width: 200px;
   box-shadow: -3px -3px 7px #ffffff, 3px 3px 7px #b8bcc2;
   border: none;
   border-radius: 10px;
   font-weight: bold;
   background: #e0e5ec;
}


.login .inputBx input[type="submit"] {
    box-shadow:
      -5px -5px 10px #ffffff,
       5px 5px 10px #b8bcc2;
    border: none;
    cursor: pointer;
}
.login .inputBx input[type="submit"]:hover {
    box-shadow:
            inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
    border: none;
    cursor: pointer;
}

.login .inputBx input::placeholder {
  color: gray;
}

.login .links {
  display: flex;
  justify-content: center;
  gap: 45px;
}

.links a {
  margin-top: 10px;
  color: black;
  text-decoration: none;
   animation: a ease-in-out 1s;
  animation-delay: 1.8s;
  animation-fill-mode: both;
}
svg text {
    text-transform: uppercase;
    font-size: 10rem;
    animation: stroke 7s infinite alternate;
    font-weight: bold;
    fill: transparent;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

@keyframes stroke {
    0% {
        stroke: black;
        stroke-width: 0;
        stroke-dashoffset: 25%;
        stroke-dasharray: 0 50%;
    }
    70% {
        stroke: black;
    }
    80% {
        stroke: black;
        stroke-width: 4;
    }
    100% {
        stroke: black;
        stroke-width: 0;
        stroke-dashoffset: -25%;
        stroke-dasharray:50% 0;
    }
  }
</style>

</head>

<body>

<div class="ring">
  <i style="--clr:orange;"></i>
  <i style="--clr: yellow;"></i>
  <i style="--clr:red;"></i>

  <div class="login">
    <span><a href="index.html">&times;</a></span>
    <svg viewBox="0 0 1320 300">
        <text x="50%" y="50%" text-anchor="middle">
              Sign up
        </text>
    </svg>
    <form action="">
          <div class="inputBx1">
            <input type="text" placeholder="Username" required>
          </div>

          <div class="inputBx2">
            <input type="email" placeholder="Email" required>
          </div>

          <div class="inputBx3">
            <input type="password" placeholder="Password" required>
          </div>

          <div class="inputBx">
            <button type="submit">Submit</button>
          </div>

          <div class="links">
            <a href="#">Forgot Password</a>
            <a href="finalLogIn.html">Log-In</a>
          </div>
    </form>
  </div>
</div>

</body>
</html>
